<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to Image</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-section, .preview-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .section-header {
            background: #4a90e2;
            color: white;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 16px;
        }

        .markdown-input {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: none;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        .preview-content {
            padding: 16px;
            min-height: 200px;
            background: white;
            overflow-wrap: break-word;
        }

        .preview-content h1, .preview-content h2, .preview-content h3 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #333;
        }

        .preview-content p {
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .preview-content ul, .preview-content ol {
            margin-bottom: 16px;
            padding-left: 20px;
        }

        .preview-content code {
            background: #f1f1f1;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }

        .preview-content pre {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn {
            background: #28a745;
            color: white;
        }

        .download-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .share-btn {
            background: #007AFF;
            color: white;
        }

        .share-btn:hover {
            background: #0056CC;
            transform: translateY(-1px);
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-icon {
            font-size: 20px;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 1200px;
            }

            .editor-container {
                flex-direction: row;
            }

            .input-section, .preview-section {
                flex: 1;
            }

            .button-container {
                flex-direction: row;
            }
        }

        /* iPhone specific optimizations */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 20px;
            }

            .markdown-input {
                min-height: 150px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .preview-content {
                min-height: 150px;
            }

            .action-btn {
                font-size: 16px;
                padding: 14px;
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Markdown to Image</h1>
            <p>Type or paste your markdown below and download as image</p>
        </div>

        <div class="editor-container">
            <div class="input-section">
                <div class="section-header">Markdown Editor</div>
                <textarea
                    class="markdown-input"
                    id="markdown-input"
                    placeholder="# Hello World

This is **bold** text and this is *italic* text.

- List item 1
- List item 2
- List item 3

```javascript
console.log('Hello, World!');
```

> This is a blockquote"
                ></textarea>
            </div>

            <div class="preview-section">
                <div class="section-header">Preview</div>
                <div class="preview-content" id="preview-content">
                    <p>Your markdown preview will appear here...</p>
                </div>
            </div>
        </div>

        <button class="action-btn share-btn" id="share-btn">
            Download As Image
        </button>
    </div>

    <script>
        const markdownInput = document.getElementById('markdown-input');
        const previewContent = document.getElementById('preview-content');
        const shareBtn = document.getElementById('share-btn');

        function updatePreview() {
            const markdownText = markdownInput.value;
            if (markdownText.trim() === '') {
                previewContent.innerHTML = '<p>Your markdown preview will appear here...</p>';
                return;
            }

            const htmlContent = marked.parse(markdownText);
            previewContent.innerHTML = htmlContent;
        }

        function generateCanvas() {
            return html2canvas(previewContent, {
                backgroundColor: '#ffffff',
                scale: 2,
                useCORS: true,
                allowTaint: true
            });
        }

        function setButtonLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="btn-icon">⏳</span><span>Generating...</span>';
            } else {
                button.disabled = false;
                button.innerHTML = '<span class="btn-icon"></span><span>Download As Image</span>';
            }
        }

        async function shareAsImage() {
            if (!navigator.share) {
                // Fallback to download if Web Share API is not supported
                downloadAsImage();
                return;
            }

            setButtonLoading(shareBtn, true);

            try {
                const canvas = await generateCanvas();

                // Convert canvas to blob
                canvas.toBlob(async (blob) => {
                    try {
                        const file = new File([blob], 'markdown-export.png', { type: 'image/png' });

                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                title: 'Markdown Export',
                                text: 'Generated from Markdown to Image',
                                files: [file]
                            });
                        } else {
                            // Fallback to basic share without files
                            const dataUrl = canvas.toDataURL('image/png');
                            await navigator.share({
                                title: 'Markdown Export',
                                text: 'Generated from Markdown to Image',
                                url: dataUrl
                            });
                        }
                    } catch (shareError) {
                        console.log('Share cancelled or failed:', shareError);
                        // If share fails, fallback to download
                        downloadAsImage();
                    } finally {
                        setButtonLoading(shareBtn, false);
                    }
                }, 'image/png');
            } catch (error) {
                console.error('Error generating image:', error);
                alert('Error generating image. Please try again.');
                setButtonLoading(shareBtn, false);
            }
        }

        function downloadAsImage() {
            setButtonLoading(shareBtn, true);

            generateCanvas().then(canvas => {
                const link = document.createElement('a');
                link.download = 'markdown-export.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                setButtonLoading(shareBtn, false);
            }).catch(error => {
                console.error('Error generating image:', error);
                alert('Error generating image. Please try again.');
                setButtonLoading(shareBtn, false);
            });
        }

        markdownInput.addEventListener('input', updatePreview);
        shareBtn.addEventListener('click', shareAsImage);

        // Initial preview update
        updatePreview();
    </script>
</body>
</html>
