<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/nXRkDYO.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/nXRkDYO.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Learner">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #666;
        }

        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .blog-post {
            background: white;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .blog-post:hover:not(.read) {
            transform: translateY(-2px);
            box-shadow: 0 4px 25px rgba(0,0,0,0.12);
        }

        .blog-post.read {
            opacity: 0.5;
        }

        .blog-post.collapsed .post-content {
            display: none;
        }

        .blog-post.collapsed .post-date {
            display: none;
        }

        .blog-post.collapsed .mark-read-btn {
            margin-top: 0;
        }

        .mark-read-btn-bottom {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }

        .mark-read-btn-bottom:hover {
            background: #5a6fd8;
        }

        .mark-read-btn-bottom.read {
            background: #28a745;
        }

        .mark-read-btn-bottom.read:hover {
            background: #218838;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background-color: #f8f9fa;
            padding: 10px 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .highlight {
            background-color: #fff3cd;
            border-radius: 2px;
            padding: 1px 2px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .highlight:hover {
            background-color: #ffeaa7;
        }

        .highlight-tooltip {
            position: absolute;
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            user-select: none;
        }

        .highlight-tooltip:hover {
            background: #667eea;
        }

        .highlight-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        .highlight-tooltip:hover::after {
            border-color: #667eea transparent transparent transparent;
        }

        .search-container {
            flex: 1;
            min-width: 200px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .collapse-all-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .collapse-all-btn:hover {
            background: #5a6fd8;
        }

        .post-header {
            padding: 25px 30px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .post-header:hover {
            background-color: #f8f9fa;
        }


        .post-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #667eea;
        }

        .post-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .post-title a:hover {
            color: #667eea;
        }

        .post-date {
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: pre-line;
        }

        .mark-read-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .mark-read-btn:hover {
            background: #5a6fd8;
        }

        .mark-read-btn.read {
            background: #28a745;
        }

        .mark-read-btn.read:hover {
            background: #218838;
        }

        .sync-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .sync-notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .post-content {
            padding: 25px 30px 30px;
        }

        .post-content h1,
        .post-content h2,
        .post-content h3,
        .post-content h4,
        .post-content h5,
        .post-content h6 {
            margin: 20px 0 15px;
            color: #2c3e50;
        }

        .post-content h1 { font-size: 1.4rem; color: #2c3e50; }
        .post-content h2 { font-size: 1.3rem; }
        .post-content h3 { font-size: 1.2rem; }
        .post-content h4 { font-size: 1.1rem; }
        .post-content h5 { font-size: 1.0rem; }
        .post-content h6 { font-size: 0.95rem; }

        .post-content p {
            margin-bottom: 15px;
            color: #444;
        }

        .post-content ul,
        .post-content ol {
            margin: 15px 0;
            padding-left: 25px;
        }

        .post-content li {
            margin-bottom: 8px;
        }

        .post-content blockquote {
            border-left: 4px solid #667eea;
            margin: 20px 0;
            padding: 15px 20px;
            background: #f8f9ff;
            border-radius: 0 8px 8px 0;
        }

        .post-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }

        .post-content pre {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }

        .post-content pre code {
            background: none;
            padding: 0;
        }

        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 5px 0 20px 0;
        }

        .post-content th,
        .post-content td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .post-content th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .post-content a {
            color: #667eea;
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        .no-posts {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header h1 {
                font-size: 2rem;
            }

            .post-header,
            .post-content {
                padding: 20px;
            }

            .post-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Learner</h1>
        </header>

        <div id="loading" class="loading">
            Loading posts...
        </div>

        <div id="error" class="error" style="display: none;">
            Failed to load posts. Please try again later.
        </div>

        <div class="controls">
            <div class="search-container">
                <input type="text" class="search-bar" id="search-bar" placeholder="Search posts...">
            </div>
            <button class="collapse-all-btn" id="collapse-all-btn">Collapse All</button>
        </div>

        <div id="posts-container">
        </div>

        <div id="no-posts" class="no-posts" style="display: none;">
            No posts with summaries found.
        </div>
    </div>

    <script>
        const SHEET_URL =
        'https://docs.google.com/spreadsheets/d/1a0SeElrZfwZ9w4LtrXAXssaDSDS-ZgKWPhAzi7GkY_U/gviz/tq?tqx=out:json&tq=&gid=1037605170';

        // Global callback function for JSONP
        window.googleSheetsCallback = function(data) {
            window.sheetsData = data;
        };

        function formatDate(dateString) {
            if (!dateString) return 'No date';

            try {
                // Handle Google Sheets date format: "Date(2025,10,17)"
                if (typeof dateString === 'string' && dateString.startsWith('Date(')) {
                    const match = dateString.match(/Date\((\d+),(\d+),(\d+)\)/);
                    if (match) {
                        const year = parseInt(match[1]);
                        const month = parseInt(match[2]); // Google Sheets months are 0-indexed
                        const day = parseInt(match[3]);
                        const date = new Date(year, month, day);
                        return date.toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                    }
                }

                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;

                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (e) {
                return dateString;
            }
        }

        function createPostElement(post) {
            const postDiv = document.createElement('div');
            postDiv.className = 'blog-post';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'post-header';

            const titleElement = document.createElement('h1');
            titleElement.className = 'post-title';

            if (post.videoUrl && post.videoUrl.trim()) {
                const titleLink = document.createElement('a');
                titleLink.href = post.videoUrl;
                titleLink.target = '_blank';
                titleLink.rel = 'noopener noreferrer';
                titleLink.textContent = post.title || 'Untitled';
                titleElement.appendChild(titleLink);
            } else {
                titleElement.textContent = post.title || 'Untitled';
            }

            const dateElement = document.createElement('div');
            dateElement.className = 'post-date';
            let dateText = `Added: ${formatDate(post.addedAt)}`;
            if (post.publishedAt) {
                dateText += `\nPublished: ${formatDate(post.publishedAt)}`;
            }
            dateElement.textContent = dateText;

            const markReadBtn = document.createElement('button');
            markReadBtn.className = 'mark-read-btn';

            // Initialize button state based on post.isRead
            if (post.isRead) {
                markReadBtn.textContent = 'Mark as unread';
                markReadBtn.classList.add('read');
                postDiv.classList.add('read');
                // Read posts start collapsed
                postDiv.classList.add('collapsed');
            } else {
                markReadBtn.textContent = 'Mark as read';
            }

            markReadBtn.addEventListener('click', function() {
                toggleReadStatus(postDiv, markReadBtn, post.videoUrl);
            });

            // Create bottom mark read button
            const markReadBtnBottom = document.createElement('button');
            markReadBtnBottom.className = 'mark-read-btn-bottom';

            // Initialize bottom button state based on post.isRead
            if (post.isRead) {
                markReadBtnBottom.textContent = 'Mark as unread';
                markReadBtnBottom.classList.add('read');
            } else {
                markReadBtnBottom.textContent = 'Mark as read';
            }

            markReadBtnBottom.addEventListener('click', function() {
                toggleReadStatusNoCollapse(postDiv, markReadBtnBottom, post.videoUrl);
            });

            // Add click handler to header for collapse/expand
            headerDiv.addEventListener('click', function(e) {
                // Don't trigger if clicking on either mark read button
                if (e.target === markReadBtn || e.target === markReadBtnBottom) {
                    return;
                }
                toggleCollapse(postDiv);
            });

            headerDiv.appendChild(titleElement);
            headerDiv.appendChild(dateElement);
            headerDiv.appendChild(markReadBtn);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'post-content';

            try {
                // Parse markdown to HTML
                let htmlContent = marked.parse(post.summary || '');

                // Remove the first H1 title from content (it's already in the header)
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlContent;
                const firstH1 = tempDiv.querySelector('h1');
                if (firstH1) {
                    firstH1.remove();
                }
                contentDiv.innerHTML = tempDiv.innerHTML;
            } catch (e) {
                console.error('Error parsing markdown:', e);
                // Fallback to plain text with line breaks
                contentDiv.innerHTML = (post.summary || '').replace(/\n/g, '<br>');
            }

            // Add bottom button to content
            contentDiv.appendChild(markReadBtnBottom);

            postDiv.appendChild(headerDiv);
            postDiv.appendChild(contentDiv);

            return postDiv;
        }

        function loadPostsWithJSONP() {
            return new Promise((resolve, reject) => {
                // Create a global callback function that Google Sheets will call
                window.google = window.google || {};
                window.google.visualization = window.google.visualization || {};
                window.google.visualization.Query = window.google.visualization.Query || {};
                window.google.visualization.Query.setResponse = function(response) {
                    resolve(response);
                };

                const script = document.createElement('script');
                script.src = SHEET_URL;
                script.onerror = () => {
                    document.head.removeChild(script);
                    reject(new Error('Failed to load data'));
                };

                script.onload = () => {
                    document.head.removeChild(script);
                };

                document.head.appendChild(script);
            });
        }

        async function loadPosts() {
            const loadingElement = document.getElementById('loading');
            const errorElement = document.getElementById('error');
            const postsContainer = document.getElementById('posts-container');
            const noPostsElement = document.getElementById('no-posts');

            try {
                const data = await loadPostsWithJSONP();
                loadingElement.style.display = 'none';

                if (!data.table || !data.table.rows) {
                    throw new Error('Invalid data structure');
                }

                const rows = data.table.rows;
                const posts = [];

                // Find column indices
                const cols = data.table.cols;
                const columnMap = {};
                cols.forEach((col, index) => {
                    if (col.label) {
                        columnMap[col.label.toLowerCase()] = index;
                    }
                });

                const titleIndex = columnMap['video title'] ?? -1;
                const urlIndex = columnMap['video url'] ?? -1;
                const dateIndex = columnMap['added at'] ?? -1;
                const publishedIndex = columnMap['published at'] ?? -1;
                const summaryIndex = columnMap['summary'] ?? -1;
                const readIndex = columnMap['read'] ?? -1;

                // Process rows
                rows.forEach(row => {
                    if (!row.c) return;

                    const title = titleIndex >= 0 && row.c[titleIndex] ? row.c[titleIndex].v : '';
                    const videoUrl = urlIndex >= 0 && row.c[urlIndex] ? row.c[urlIndex].v : '';
                    const addedAt = dateIndex >= 0 && row.c[dateIndex] ? row.c[dateIndex].v : '';
                    const publishedAt = publishedIndex >= 0 && row.c[publishedIndex] ? row.c[publishedIndex].v : '';
                    const summary = summaryIndex >= 0 && row.c[summaryIndex] ? row.c[summaryIndex].v : '';
                    const isRead = readIndex >= 0 && row.c[readIndex] ? (row.c[readIndex].v === 1 || row.c[readIndex].v === '1') : false;

                    // Only include posts with non-empty summaries
                    if (summary && summary.trim()) {
                        posts.push({
                            title: title,
                            videoUrl: videoUrl,
                            addedAt: addedAt,
                            publishedAt: publishedAt,
                            summary: summary.trim(),
                            isRead: isRead
                        });
                    }
                });

                if (posts.length === 0) {
                    noPostsElement.style.display = 'block';
                    return;
                }

                // Sort posts by date (newest first)
                posts.sort((a, b) => {
                    const dateA = new Date(a.addedAt);
                    const dateB = new Date(b.addedAt);
                    return dateB - dateA;
                });

                // Render posts
                posts.forEach(post => {
                    const postElement = createPostElement(post);
                    postsContainer.appendChild(postElement);
                });

            } catch (error) {
                console.error('Error loading posts:', error);
                loadingElement.style.display = 'none';
                errorElement.style.display = 'block';
                errorElement.textContent = `Failed to load posts: ${error.message}`;
            }
        }

        function toggleCollapse(postDiv) {
            postDiv.classList.toggle('collapsed');
        }

        function toggleReadStatus(postDiv, button, videoUrl) {
            const isRead = postDiv.classList.contains('read');

            // Find both buttons to sync them
            const topButton = postDiv.querySelector('.mark-read-btn');
            const bottomButton = postDiv.querySelector('.mark-read-btn-bottom');

            if (isRead) {
                // Mark as unread - force expand
                postDiv.classList.remove('read', 'collapsed');

                // Update both buttons
                if (topButton) {
                    topButton.textContent = 'Mark as read';
                    topButton.classList.remove('read');
                }
                if (bottomButton) {
                    bottomButton.textContent = 'Mark as read';
                    bottomButton.classList.remove('read');
                }

                // Call webhook for unread (read=0)
                callWebhook(videoUrl, 0);
            } else {
                // Mark as read - force collapse
                postDiv.classList.add('read', 'collapsed');

                // Update both buttons
                if (topButton) {
                    topButton.textContent = 'Mark as unread';
                    topButton.classList.add('read');
                }
                if (bottomButton) {
                    bottomButton.textContent = 'Mark as unread';
                    bottomButton.classList.add('read');
                }

                // Call webhook for read (read=1)
                callWebhook(videoUrl, 1);
            }
        }

        function toggleReadStatusNoCollapse(postDiv, button, videoUrl) {
            const isRead = postDiv.classList.contains('read');

            // Find both buttons to sync them
            const topButton = postDiv.querySelector('.mark-read-btn');
            const bottomButton = postDiv.querySelector('.mark-read-btn-bottom');

            if (isRead) {
                // Mark as unread - don't change collapse state
                postDiv.classList.remove('read');

                // Update both buttons
                if (topButton) {
                    topButton.textContent = 'Mark as read';
                    topButton.classList.remove('read');
                }
                if (bottomButton) {
                    bottomButton.textContent = 'Mark as read';
                    bottomButton.classList.remove('read');
                }

                // Call webhook for unread (read=0)
                callWebhook(videoUrl, 0);
            } else {
                // Mark as read - don't change collapse state
                postDiv.classList.add('read');

                // Update both buttons
                if (topButton) {
                    topButton.textContent = 'Mark as unread';
                    topButton.classList.add('read');
                }
                if (bottomButton) {
                    bottomButton.textContent = 'Mark as unread';
                    bottomButton.classList.add('read');
                }

                // Call webhook for read (read=1)
                callWebhook(videoUrl, 1);
            }
        }

        function callWebhook(videoUrl, readStatus) {
            if (!videoUrl) return;

            const webhookUrl = `https://n8n.synergychen.com/webhook/c8115c00-5be7-45c3-88a6-04be9db381f4?url=${encodeURIComponent(videoUrl)}&read=${readStatus}`;

            fetch(webhookUrl, {
                method: 'GET',
                mode: 'no-cors' // This allows the request to go through even if CORS is not configured
            })
            .then(() => {
                // Show sync notification on success
                showSyncNotification();
            })
            .catch((error) => {
                console.error('Webhook call failed:', error);
                // Still show notification since we can't detect success/failure with no-cors
                showSyncNotification();
            });
        }

        function showSyncNotification() {
            // Remove any existing notification
            const existingNotification = document.querySelector('.sync-notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            // Create new notification
            const notification = document.createElement('div');
            notification.className = 'sync-notification';
            notification.textContent = 'Synced';
            document.body.appendChild(notification);

            // Show notification
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            // Hide and remove notification after 1 second
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 1000);
        }

        // Search functionality
        function setupSearch() {
            const searchBar = document.getElementById('search-bar');
            const postsContainer = document.getElementById('posts-container');

            searchBar.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                const posts = postsContainer.querySelectorAll('.blog-post');

                posts.forEach(post => {
                    const title = post.querySelector('.post-title').textContent.toLowerCase();
                    const content = post.querySelector('.post-content').textContent.toLowerCase();

                    if (searchTerm === '' || title.includes(searchTerm) || content.includes(searchTerm)) {
                        post.style.display = '';
                    } else {
                        post.style.display = 'none';
                    }
                });
            });
        }

        // Collapse/Expand all functionality
        function setupCollapseAll() {
            const collapseAllBtn = document.getElementById('collapse-all-btn');
            const postsContainer = document.getElementById('posts-container');
            let allCollapsed = false;

            collapseAllBtn.addEventListener('click', function() {
                const posts = postsContainer.querySelectorAll('.blog-post');

                if (allCollapsed) {
                    // Expand all
                    posts.forEach(post => {
                        post.classList.remove('collapsed');
                    });
                    this.textContent = 'Collapse All';
                    allCollapsed = false;
                } else {
                    // Collapse all
                    posts.forEach(post => {
                        post.classList.add('collapsed');
                    });
                    this.textContent = 'Expand All';
                    allCollapsed = true;
                }
            });
        }

        // Text highlighting functionality
        function setupTextHighlighting() {
            let tooltip = null;

            document.addEventListener('mouseup', function(e) {
                // Small delay to ensure selection is complete
                setTimeout(() => {
                    const selection = window.getSelection();
                    const selectedText = selection.toString().trim();

                    console.log('Selection detected:', selectedText); // Debug log

                    // Remove existing tooltip
                    if (tooltip) {
                        tooltip.remove();
                        tooltip = null;
                    }

                    // Only show tooltip if text is selected and it's within post content
                    if (selectedText && selection.rangeCount > 0 && selectedText.length > 2) {
                        const range = selection.getRangeAt(0);
                        const container = range.commonAncestorContainer;

                        // Check if selection is within post content
                        let element = container.nodeType === Node.TEXT_NODE ? container.parentElement : container;
                        const postContent = element.closest('.post-content');

                        console.log('Post content found:', !!postContent); // Debug log

                        if (postContent) {
                            showHighlightTooltip(range);
                        }
                    }
                }, 10);
            });

            // Hide tooltip when clicking elsewhere
            document.addEventListener('mousedown', function(e) {
                if (tooltip && !tooltip.contains(e.target)) {
                    tooltip.remove();
                    tooltip = null;
                }
            });

            function showHighlightTooltip(range) {
                tooltip = document.createElement('div');
                tooltip.className = 'highlight-tooltip';
                tooltip.textContent = 'Highlight';

                // Position tooltip above the selection
                const rect = range.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                tooltip.style.position = 'absolute';
                tooltip.style.left = Math.max(10, rect.left + rect.width / 2) + 'px';
                tooltip.style.top = (rect.top + scrollTop - 45) + 'px';
                tooltip.style.transform = 'translateX(-50%)';

                console.log('Tooltip positioned at:', tooltip.style.left, tooltip.style.top); // Debug log

                document.body.appendChild(tooltip);

                tooltip.addEventListener('click', function() {
                    highlightSelection(range);
                    tooltip.remove();
                    tooltip = null;
                    window.getSelection().removeAllRanges();
                });
            }

            function highlightSelection(range) {
                try {
                    // Check if selection spans across different block elements (like list items)
                    const startContainer = range.startContainer;
                    const endContainer = range.endContainer;

                    // Get the closest block elements
                    const startBlock = getClosestBlockElement(startContainer);
                    const endBlock = getClosestBlockElement(endContainer);

                    // If selection spans across different block elements, highlight each separately
                    if (startBlock !== endBlock) {
                        console.log('Selection spans across different block elements, highlighting each separately');
                        highlightAcrossBlocks(range);
                        return;
                    }

                    // Check if we're inside a list item and the selection is complex
                    const listItem = range.commonAncestorContainer.nodeType === Node.TEXT_NODE ?
                        range.commonAncestorContainer.parentElement.closest('li') :
                        range.commonAncestorContainer.closest('li');

                    if (listItem) {
                        // For list items, use a safer highlighting approach
                        highlightInListItem(range);
                    } else {
                        // Standard highlighting for regular text
                        const contents = range.extractContents();
                        const span = document.createElement('span');
                        span.className = 'highlight';
                        span.appendChild(contents);
                        range.insertNode(span);

                        addRemoveHighlightHandler(span);
                    }
                } catch (error) {
                    console.error('Error highlighting text:', error);
                }
            }

            function highlightAcrossBlocks(range) {
                // Get all text nodes within the selection
                const walker = document.createTreeWalker(
                    range.commonAncestorContainer,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode: function(node) {
                            // Only include text nodes that are within the selection
                            const nodeRange = document.createRange();
                            nodeRange.selectNodeContents(node);

                            // Check if this text node intersects with our selection
                            if (range.intersectsNode(node)) {
                                return NodeFilter.FILTER_ACCEPT;
                            }
                            return NodeFilter.FILTER_REJECT;
                        }
                    }
                );

                const textNodes = [];
                let node;
                while (node = walker.nextNode()) {
                    textNodes.push(node);
                }

                // Process each text node that intersects with the selection
                textNodes.forEach(textNode => {
                    const blockElement = getClosestBlockElement(textNode);
                    if (!blockElement) return;

                    // Create a range for this specific text node
                    const nodeRange = document.createRange();
                    nodeRange.selectNodeContents(textNode);

                    // Find the intersection with the original selection
                    const intersectionRange = document.createRange();

                    // Determine start and end points for this text node
                    let startOffset = 0;
                    let endOffset = textNode.textContent.length;

                    // If this is the start node, use the selection's start offset
                    if (textNode === range.startContainer) {
                        startOffset = range.startOffset;
                    }

                    // If this is the end node, use the selection's end offset
                    if (textNode === range.endContainer) {
                        endOffset = range.endOffset;
                    }

                    // Only highlight if there's actual text to highlight
                    if (startOffset < endOffset) {
                        intersectionRange.setStart(textNode, startOffset);
                        intersectionRange.setEnd(textNode, endOffset);

                        // Highlight this portion
                        highlightSingleRange(intersectionRange);
                    }
                });
            }

            function highlightSingleRange(range) {
                try {
                    const contents = range.extractContents();
                    const span = document.createElement('span');
                    span.className = 'highlight';
                    span.appendChild(contents);
                    range.insertNode(span);

                    addRemoveHighlightHandler(span);
                } catch (error) {
                    console.error('Error highlighting single range:', error);
                }
            }

            function getClosestBlockElement(node) {
                const blockElements = ['P', 'DIV', 'LI', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'BLOCKQUOTE'];
                let current = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;

                while (current && current !== document.body) {
                    if (blockElements.includes(current.tagName)) {
                        return current;
                    }
                    current = current.parentElement;
                }
                return null;
            }

            function highlightInListItem(range) {
                // For list items, we'll wrap the text more carefully
                const selection = range.toString();
                const startOffset = range.startOffset;
                const endOffset = range.endOffset;
                const container = range.startContainer;

                if (container.nodeType === Node.TEXT_NODE && range.startContainer === range.endContainer) {
                    // Simple case: selection within a single text node
                    const textNode = container;
                    const beforeText = textNode.textContent.substring(0, startOffset);
                    const selectedText = textNode.textContent.substring(startOffset, endOffset);
                    const afterText = textNode.textContent.substring(endOffset);

                    // Create new nodes
                    const beforeNode = document.createTextNode(beforeText);
                    const highlightSpan = document.createElement('span');
                    highlightSpan.className = 'highlight';
                    highlightSpan.textContent = selectedText;
                    const afterNode = document.createTextNode(afterText);

                    // Replace the original text node
                    const parent = textNode.parentNode;
                    parent.insertBefore(beforeNode, textNode);
                    parent.insertBefore(highlightSpan, textNode);
                    parent.insertBefore(afterNode, textNode);
                    parent.removeChild(textNode);

                    addRemoveHighlightHandler(highlightSpan);
                } else {
                    console.log('Complex list selection, skipping highlight to preserve structure');
                }
            }

            function addRemoveHighlightHandler(span) {
                span.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const parent = span.parentNode;
                    const textContent = span.textContent;
                    const textNode = document.createTextNode(textContent);
                    parent.replaceChild(textNode, span);
                    parent.normalize(); // Merge adjacent text nodes
                });
            }
        }

        // Load posts when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadPosts().then(() => {
                setupSearch();
                setupCollapseAll();
                setupTextHighlighting();
            });
        });
    </script>
</body>
